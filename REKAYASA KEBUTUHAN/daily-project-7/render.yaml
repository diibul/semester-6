services:
  - type: web
    name: studiobook-web
    env: php
    rootDir: .
    buildCommand: |
      cd backend
      composer install --no-interaction --no-dev --optimize-autoloader
      mkdir -p database
      touch database/database.sqlite
      php artisan config:clear
      php artisan route:clear
      php artisan view:clear
      cd ../frontend
      npm ci
      npm run build
      cd ../backend
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: |
      cd backend
      php artisan migrate --force
      php -S 0.0.0.0:$PORT -t public public/index.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: warning
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /opt/render/project/src/backend/database/database.sqlite
